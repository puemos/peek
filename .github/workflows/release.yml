name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build & package
        id: pkg
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          NAME="peek_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${NAME}"
          EXT=""
          [ "${GOOS}" = "windows" ] && EXT=".exe"
          go build -trimpath -ldflags "-s -w" -o "dist/${NAME}/peekd${EXT}" ./cmd/peekd
          go build -trimpath -ldflags "-s -w" -o "dist/${NAME}/peek${EXT}"  ./cmd/peek
          cp README.md LICENSE "dist/${NAME}/" 2>/dev/null || true
          cd dist
          if [ "${GOOS}" = "windows" ]; then
            zip -r "${NAME}.zip" "${NAME}"
            echo "archive=dist/${NAME}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czf "${NAME}.tar.gz" "${NAME}"
            echo "archive=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.archive }}
          generate_release_notes: true
