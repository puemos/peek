services:
  peek:
    build: .
    image: peek:local
    container_name: peek
    ports:
      - "7700:7700"
    volumes:
      - peek-data:/data
    environment:
      PEEK_ADDR: ":7700"
      PEEK_BASE_URL: http://localhost:7700
      PEEK_MAX_UPLOAD: "2097152"
      PEEK_MAX_TOTAL_SIZE: "0"
      PEEK_RETENTION_DAYS: "0"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: peek-minio
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address :9001
    volumes:
      - minio-data:/data
    profiles:
      - s3

  minio-init:
    image: minio/mc:latest
    container_name: peek-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do sleep 2; done;
      mc mb --ignore-existing local/peek;
      "
    profiles:
      - s3

  peek-s3:
    build: .
    image: peek:local
    container_name: peek-s3
    ports:
      - "7711:7700"
    environment:
      PEEK_ADDR: ":7700"
      PEEK_BASE_URL: http://localhost:7711
      PEEK_STORAGE: s3
      PEEK_S3_ENDPOINT: http://minio:9000
      PEEK_S3_BUCKET: peek
      PEEK_S3_REGION: us-east-1
      PEEK_S3_ACCESS_KEY: minioadmin
      PEEK_S3_SECRET_KEY: minioadmin
      PEEK_S3_ALLOW_PRIVATE_ENDPOINT: "true"
      PEEK_MAX_UPLOAD: "2097152"
      PEEK_MAX_TOTAL_SIZE: "0"
      PEEK_RETENTION_DAYS: "0"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    profiles:
      - s3

volumes:
  peek-data:
  minio-data:
